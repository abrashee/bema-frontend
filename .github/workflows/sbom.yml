name: Container SBOM

on:
  push:
    branches:
      - dev
      - main
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - pom.xml
      - src/**
      - prisma/**
      - .github/workflows/sbom.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate frontend SBOM
    uses: abrashee/bema-infrastructure/.github/workflows/reusable-container-sbom.yml@dev
    with:
      repository: abrashee/Bema-frontend
      ref: ${{ github.sha }}
      image-name: bema-frontend
      artifact-name: frontend
