name: Frontend CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test-build-bundle:
    name: Test, build, and bundle check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run production build
        run: npm run build

      - name: Run bundle analysis
        run: npm run analyze:bundle

      - name: Run Lighthouse gate
        run: npm run ci:lighthouse
